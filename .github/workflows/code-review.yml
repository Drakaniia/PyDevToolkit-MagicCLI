name: Code Review

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install tools
      run: pip install pylint flake8 bandit

    - name: Security Scan
      continue-on-error: true
      run: bandit -r src/ -f json -o bandit.json || true

    - name: Code Quality
      continue-on-error: true
      run: pylint src/ --output-format=json > pylint.json || true

    - name: Style Check
      continue-on-error: true
      run: flake8 src/ --format=json --output-file=flake8.json || true

    - name: Upload Reports
      uses: actions/upload-artifact@v3
      with:
        name: code-review-reports
        path: "*.json"

    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let comment = '## 🔍 Code Review\n\n';
          try {
            const bandit = JSON.parse(fs.readFileSync('bandit.json', 'utf8'));
            comment += `**Security:** ${bandit.results?.length || 0} issues\n`;
          } catch (e) {}
          try {
            const flake8 = JSON.parse(fs.readFileSync('flake8.json', 'utf8'));
            comment += `**Style:** ${Object.keys(flake8).length} issues\n`;
          } catch (e) {}
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
